    <style>
        :root {
            --primary: #6b58a6;
            --success: #4caf50;
            --error: #f44336;
            --bg: #f3f0ff;
        }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        #game-box { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(107, 88, 166, 0.2); width: 100%; max-width: 700px; text-align: center; position: relative; min-height: 550px; display: flex; flex-direction: column; }
        
        .progress-bar { position: absolute; top: 0; left: 0; height: 8px; background: var(--primary); transition: width 0.3s; width: 0%; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--primary); font-weight: bold; font-size: 1.1rem; }
        
        #question { font-size: 1.6rem; font-weight: 600; line-height: 1.6; margin: 40px 0; color: #222; word-break: keep-all; }
        #question u { text-decoration: underline; text-underline-offset: 10px; color: var(--primary); font-size: 1.8rem; }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: auto; }
        button { padding: 20px; font-size: 1.1rem; border: 2px solid #eee; border-radius: 15px; background: white; cursor: pointer; transition: all 0.2s; font-family: inherit; font-weight: bold; color: #555; }
        button:hover:not(:disabled) { border-color: var(--primary); background: #fdfcff; transform: translateY(-3px); }
        button.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        button.wrong { background: var(--error) !important; color: white; border-color: var(--error); }
        
        .hidden { display: none !important; }
        
        #start-screen, #result-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 30px; box-sizing: border-box; border-radius: 25px; }
        
        /* DAY 선택 버튼 스타일 */
        .day-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; width: 100%; }
        .day-btn { padding: 10px; background: rgba(255,255,255,0.2); border: 1px solid white; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .day-btn:hover { background: white; color: var(--primary); }
        
        .btn-main { background: white; color: var(--primary); border: none; padding: 18px 60px; border-radius: 50px; font-size: 1.3rem; font-weight: bold; margin-top: 30px; cursor: pointer; transition: 0.3s; }

        #review-container { text-align: left; width: 100%; max-height: 250px; overflow-y: auto; background: rgba(255,255,255,0.9); color: #333; padding: 15px; border-radius: 15px; margin-top: 20px; }
        .review-item { border-bottom: 1px solid #ddd; padding: 8px 0; font-size: 0.9rem; }
    </style>
</head>

        <p id="selected-msg" style="margin-top:20px; font-weight: bold; color: #ffeb3b;"></p>

        </div>

            return;
        }

        document.getElementById('progress').style.width = `${((currentIdx) / questions.length) * 100}%`;

        let options = [qData.a, ...qData.d].sort(() => Math.random() - 0.5);
        const buttons = document.querySelectorAll('.options button');
        buttons.forEach((btn, idx) => {
            btn.innerText = options[idx];
            btn.className = '';
            btn.disabled = false;
        });
    }

        } else {
            buttons[idx].classList.add('wrong');
            mistakes.push({ q: questions[currentIdx].q, y: selected, c: correct });
            buttons.forEach(btn => { if (btn.innerText === correct) btn.classList.add('correct'); });
        }
        currentIdx++;
        setTimeout(showQuestion, 1000);
    }

    function showResult() {
        const resultScreen = document.getElementById('result-screen');
        const totalScore = questions.length * 100;
        const passScore = totalScore * 0.8;
        
        resultScreen.classList.remove('hidden');
        document.getElementById('final-score-text').innerText = `점수: ${score} / ${totalScore}`;
        
        const reviewList = document.getElementById('review-list');
        reviewList.innerHTML = "";

        if (score >= passScore) {
            document.getElementById('result-title').innerText = "PASS! 🎉";
            document.getElementById('result-msg').innerText = "가은아, 완벽해! 틀린 단어 다시보자!";
            resultScreen.style.background = "#4caf50";
        } else {
            document.getElementById('result-title').innerText = "FAIL.. 🥊";
            document.getElementById('result-msg').innerText = "재시험가즈아! 틀린단어 체크!";
            resultScreen.style.background = "#f44336";
        }

        mistakes.forEach(m => {
            const item = document.createElement('div');
            item.className = 'review-item';
            item.innerHTML = `<b>Q: ${m.q}</b><br><span style="color:red">선택: ${m.y}</span> | <span style="color:green">정답: ${m.c}</span>`;
            reviewList.appendChild(item);
        });
        if(mistakes.length === 0) reviewList.innerHTML = "틀린 문제가 없어요! 만점입니다! 💯";
    }
</script>
</body>
</html>
